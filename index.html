                    <h1 class="text-base font-black tracking-tight text-slate-900 uppercase leading-none">Empire</h1>
                    <p class="text-[9px] uppercase tracking-widest text-slate-400 font-extrabold mt-1">Canopy • Sign • Construction</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="bg-slate-900 text-white text-[10px] px-3 py-1 rounded-md font-bold uppercase tracking-wider shadow-sm">
                    Sign Survey Utility
                </span>
                <span id="stepCount" class="text-[10px] text-slate-400 font-mono mt-1 font-bold">Step 1 of 3</span>
            </div>
        </header>

        <!-- TWO-COLUMN WORKSPACE CONTAINER -->
        <main class="flex-1 lg:flex max-w-7xl w-full mx-auto p-4 lg:p-8 gap-8 items-start mb-24">
            
            <!-- LEFT COLUMN: VISUAL SCHEMATIC CARD -->
            <section class="w-full lg:w-5/12 mb-6 lg:mb-0">
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-xs sticky top-[90px] flex flex-col items-center min-h-[380px] justify-center">
                    <span class="text-[11px] font-extrabold tracking-widest text-slate-400 uppercase mb-6 block text-center" id="diagramTitle">
                        INTERACTIVE CABINET BLUEPRINT
                    </span>
                    
                    <!-- DIAGRAM VIEWER 1: CABINET GRID -->
                    <div id="canvas-matrix" class="w-full flex justify-center items-center py-2">
                        <div class="flex items-center gap-4 w-full justify-center">
                            <!-- Dynamic Visual Stack Container -->
                            <div id="visual-stack-container" class="flex flex-col-reverse gap-0 border-x border-b border-dashed border-slate-300 p-2 w-48 bg-slate-50/50 rounded-b-lg">
                                <!-- Generated elements live here dynamically -->
                            </div>
                            <!-- Dimension Arrow Element -->
                            <div class="flex flex-col justify-between h-48 text-slate-400 font-mono text-xs">
                                <span class="material-icons text-sm leading-none">arrow_upward</span>
                                <div class="w-[1px] h-full bg-slate-200 mx-auto"></div>
                                <span class="material-icons text-sm leading-none">arrow_downward</span>
                            </div>
                        </div>
                    </div>

                    <!-- DIAGRAM VIEWER 2: ELEVATIONS -->
                    <div id="canvas-elevation" class="w-full hidden py-2 flex justify-center">
                        <svg width="240" height="200" viewBox="0 0 240 200" class="overflow-visible">
                            <rect x="65" y="45" width="100" height="40" rx="4" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
                            <!-- Divider line inside cabinet graphic mimicking reality -->
                            <line x1="65" y1="65" x2="165" y2="65" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2" />
                            <rect x="110" y="85" width="16" height="65" fill="#334155"/>
                            <line x1="20" y1="150" x2="220" y2="150" stroke="#0f172a" stroke-width="3"/>
                            <text x="190" y="168" class="fill-slate-400 text-[9px] font-black tracking-wider uppercase">GRADE</text>

                            <!-- Dimension Lines (Overall Height) -->
                            <g fill="none" stroke="#2563eb" stroke-width="1.5">
                                <path d="M 45 45 L 45 150"/>
                                <path d="M 41 52 L 45 45 L 49 52"/>
                                <path d="M 41 143 L 45 150 L 49 143"/>
                            </g>
                            <text x="35" y="95" text-anchor="middle" transform="rotate(-90 35,95)" class="fill-blue-600 font-mono text-[9px] font-black uppercase tracking-wider">OVERALL HT</text>

                            <!-- Dimension Lines (Clearance) -->
                            <g fill="none" stroke="#16a34a" stroke-width="1.5">
                                <path d="M 185 85 L 185 150"/>
                                <path d="M 181 92 L 185 85 L 189 92"/>
                                <path d="M 181 143 L 185 150 L 189 143"/>
                            </g>
                            <text x="195" y="115" text-anchor="middle" transform="rotate(90 195,115)" class="fill-green-600 font-mono text-[9px] font-black uppercase tracking-wider">CLEARANCE</text>
                        </svg>
                    </div>

                    <!-- DIAGRAM VIEWER 3: BASEPLATE -->
                    <div id="canvas-baseplate" class="w-full hidden py-4 flex justify-center">
                        <svg width="180" height="180" viewBox="0 0 180 180" class="overflow-visible">
                            <rect x="25" y="25" width="130" height="130" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
                            <circle cx="90" cy="90" r="28" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
                            
                            <!-- 4 Bolts Layout -->
                            <g id="g-bolts4">
                                <circle cx="50" cy="50" r="7" fill="#475569"/>
                                <circle cx="130" cy="50" r="7" fill="#475569"/>
                                <circle cx="50" cy="130" r="7" fill="#475569"/>
                                <circle cx="130" cy="130" r="7" fill="#475569"/>
                            </g>
                            <!-- 6 Bolts Layout Additional Pins -->
                            <g id="g-bolts6" class="hidden">
                                <circle cx="50" cy="90" r="7" fill="#2563eb"/>
                                <circle cx="130" cy="90" r="7" fill="#2563eb"/>
                            </g>
                        </svg>
                    </div>
                </div>
            </section>

            <!-- RIGHT COLUMN: MASTER INPUT PANEL MODULES -->
            <section class="flex-1 max-w-xl">

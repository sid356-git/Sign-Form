<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Construction - Ground Sign Survey Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .step-panel { display: none; }
        .step-panel.active { display: block; }
        .app-logo { object-fit: contain; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex flex-col antialiased">

    <div id="passwordGate" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl border border-slate-200">
            <div class="flex justify-center mb-6">
                <div class="bg-white px-6 py-2 border border-slate-200 rounded-xl shadow-sm flex flex-col items-center justify-center h-20 w-48">
                    <img src="empire - logo.png" alt="Empire Construction" class="app-logo w-full h-full">
                </div>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">Crew Portal Authentication</h2>
            <p class="text-sm text-slate-500 mb-6">Please enter your internal crew credentials to access interactive field blueprints.</p>
            <input type="password" id="crewPassword" placeholder="Enter Crew Passcode" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-center text-lg font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 tracking-widest mb-4 text-slate-900">
            <button onclick="verifyAccess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl shadow-lg transition-all text-sm tracking-wide">Authenticate Unit</button>
            <p id="gateError" class="text-red-600 text-xs mt-3 hidden flex items-center justify-center gap-1 font-medium">
                <span class="material-icons text-sm">error</span> Invalid Crew Token.
            </p>
        </div>
    </div>

    <div id="appInterface" class="hidden flex-1 flex flex-col min-h-screen">
        
        <header class="bg-white border-b border-slate-200 px-6 py-3 sticky top-0 z-40 shadow-xs flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white px-2 py-1 border border-slate-200 rounded-xl shadow-xs flex items-center justify-center h-12 w-28">
                    <img src="empire - logo.png" alt="Empire Construction" class="app-logo w-full h-full">
                </div>
                <div>
                    <h1 class="text-base font-black tracking-tight text-slate-900 uppercase leading-none">Empire</h1>
                    <p class="text-[9px] uppercase tracking-widest text-slate-400 font-extrabold mt-1">Canopy • Sign • Construction</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="bg-white text-slate-800 text-[10px] px-3 py-1 rounded-full font-bold border border-slate-200 uppercase tracking-wider shadow-2xs">
                    Sign Survey Utility
                </span>
                <span id="stepCount" class="text-[10px] text-slate-400 font-mono mt-1 font-bold">Step 1 of 3</span>
            </div>
        </header>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Construction - Ground Sign Survey Platform</title>
    <!-- Tailwind CSS v4 Runtime Component Library Engine -->
    <script src="https://jsdelivr.net"></script>
    <!-- Material Icons Standard Framework Layer -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- html2pdf Core Rendering Dependency Platform Stack -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        .step-panel { display: none; }
        .step-panel.active { display: block; }
        .matrix-row { transition: all 0.2s ease-in-out; }
        .matrix-row:hover, .matrix-row.active { stroke: #3b82f6; fill: rgba(59, 130, 246, 0.12); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans antialiased selection:bg-blue-600/30">

    <!-- PASSWORD ACCREDITATION GATEWAY PORTAL SCREEN -->
    <div id="passwordGate" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div class="flex justify-center mb-5">
                <!-- Precision Master Replica Vector Box Layer -->
                <div class="bg-white p-3 rounded-xl inline-block shadow-inner h-20 w-32 flex items-center justify-center">
                    <svg viewBox="0 0 120 70" class="w-full h-full max-h-full max-w-full" xmlns="http://w3.org">
                        <path d="M 18 55 C 18 10, 56 10, 56 55" fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="square"/>
                        <path d="M 64 55 C 64 10, 102 10, 102 55" fill="none" stroke="#0b3c95" stroke-width="12" stroke-linecap="square"/>
                        <line x1="12" y1="56" x2="108" y2="56" stroke="#0f172a" stroke-width="3" stroke-linecap="square"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-base font-black tracking-tight text-slate-100 uppercase">Empire Portal</h2>
            <p class="text-[11px] text-slate-400 mb-6 font-medium uppercase tracking-wider">Sign Survey Field Utility Access</p>
            <input type="password" id="crewPassword" placeholder="Enter Crew Passcode" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-center text-sm font-mono focus:outline-none focus:border-blue-500 tracking-widest mb-4 placeholder:text-slate-600 text-white">
            <button onclick="verifyAccess()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-xs uppercase tracking-wider cursor-pointer">Authenticate Unit</button>
            <p id="gateError" class="text-red-400 text-xs mt-3 hidden flex items-center justify-center gap-1 font-semibold">
                <span class="material-icons text-xs">error</span> Access Denied. Check Token Code.
            </p>
        </div>
    </div>

    <!-- MAIN DASHBOARD APPARATUS WORKSPACE PLATFORM CONTAINER -->
    <div id="appInterface" class="hidden flex-1 flex flex-col min-h-screen">
        
        <!-- HIGH-END CONTEXT HEADLINE BAR -->
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-3 sticky top-0 z-40 shadow-md flex justify-between items-center">
            <div class="flex items-center space-x-3.5">
                <div class="bg-white p-1 rounded-lg shadow-md flex items-center justify-center h-11 w-20">
                    <svg viewBox="0 0 120 70" class="w-full h-full" xmlns="http://w3.org">
                        <path d="M 18 55 C 18 10, 56 10, 56 55" fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="square"/>
                        <path d="M 64 55 C 64 10, 102 10, 102 55" fill="none" stroke="#0b3c95" stroke-width="12" stroke-linecap="square"/>
                        <line x1="12" y1="56" x2="108" y2="56" stroke="#0f172a" stroke-width="3" stroke-linecap="square"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-wider text-slate-100 leading-none uppercase">EMPIRE</h1>
                    <p class="text-[8px] uppercase tracking-widest text-slate-400 font-extrabold mt-0.5">Canopy • Sign • Construction</p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <span class="bg-blue-500/10 text-blue-400 text-[9px] px-2.5 py-0.5 rounded-md font-bold border border-blue-500/20 uppercase tracking-wider shadow-2xs">
                    Sign Survey Utility
                </span>
                <span id="stepCount" class="text-[10px] text-slate-500 font-mono mt-1 font-bold">Step 1 of 3</span>
            </div>
        </header>

        <!-- FLEX TWO-COLUMN STRUCTURAL SYSTEM PANELS GRID -->
        <div class="flex-1 lg:flex lg:overflow-hidden max-w-7xl w-full mx-auto">
            
            <!-- LEFT SCREEN VIEWPORT COLUMN: CONTROL INTERACTIVE CANVAS COMPONENT -->
            <section class="w-full lg:w-5/12 bg-slate-950 p-4 lg:p-6 border-b lg:border-b-0 lg:border-r border-slate-800/80 flex items-center justify-center lg:sticky lg:top-0 h-auto lg:h-full z-20 shadow-xl lg:shadow-none">
                <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-inner flex flex-col items-center">
                    <span class="text-[10px] font-black tracking-widest text-slate-500 uppercase mb-4 block text-center" id="diagramTitle">
                        Interactive Cabinet Blueprint
                    </span>
                    
                    <!-- DISPLAY MATRIX VISUAL 1: MULTI-STACK SECTIONS LAYOUT -->
                    <div id="canvas-matrix" class="w-full flex justify-center py-4">
                        <svg width="180" height="260" viewBox="0 0 180 260" class="overflow-visible">
                            <!-- Module Array 1 -->
                            <rect id="v-ret1" onclick="focusCardField(1)" x="20" y="10" width="100" height="48" rx="6" class="matrix-row stroke-slate-700 fill-slate-950 cursor-pointer active" stroke-width="1.5"/>
                            <text x="70" y="34" text-anchor="middle" class="fill-slate-400 text-xs font-bold pointer-events-none">Module #1</text>
                            <text id="lbl-m1" x="70" y="47" text-anchor="middle" class="fill-blue-400 text-[9px] font-mono pointer-events-none"></text>

                            <!-- Module Array 2 -->
                            <rect id="v-ret2" onclick="focusCardField(2)" x="20" y="68" width="100" height="48" rx="6" class="matrix-row stroke-slate-700 fill-slate-950 cursor-pointer" stroke-width="1.5"/>
                            <text x="70" y="92" text-anchor="middle" class="fill-slate-400 text-xs font-bold pointer-events-none">Module #2</text>
                            <text id="lbl-m2" x="70" y="105" text-anchor="middle" class="fill-blue-400 text-[9px] font-mono pointer-events-none"></text>

                            <!-- Module Array 3 -->
                            <rect id="v-ret3" onclick="focusCardField(3)" x="20" y="126" width="100" height="48" rx="6" class="matrix-row stroke-slate-700 fill-slate-950 cursor-pointer" stroke-width="1.5"/>
                            <text x="70" y="150" text-anchor="middle" class="fill-slate-400 text-xs font-bold pointer-events-none">Module #3</text>
                            <text id="lbl-m3" x="70" y="163" text-anchor="middle" class="fill-blue-400 text-[9px] font-mono pointer-events-none"></text>

                            <!-- Module Array 4 -->
                            <rect id="v-ret4" onclick="focusCardField(4)" x="20" y="184" width="100" height="48" rx="6" class="matrix-row stroke-slate-700 fill-slate-950 cursor-pointer" stroke-width="1.5"/>
                            <text x="70" y="208" text-anchor="middle" class="fill-slate-400 text-xs font-bold pointer-events-none">Module #4</text>
                            <text id="lbl-m4" x="70" y="221" text-anchor="middle" class="fill-blue-400 text-[9px] font-mono pointer-events-none"></text>

                            <!-- Vertical Reference Stack Rules Anchor -->
                            <line x1="140" y1="10" x2="140" y2="232" stroke="#475569" stroke-width="1.2"/>
                            <path d="M136,15 L140,10 L144,15 M136,227 L140,232 L144,227" fill="none" stroke="#475569" stroke-width="1.2"/>
                        </svg>
                    </div>

                    <!-- DISPLAY MATRIX VISUAL 2: FIELD ELEVATION DIAGRAM -->
                    <div id="canvas-elevation" class="w-full hidden py-2 flex justify-center">
                        <svg width="220" height="240" viewBox="0 0 220 240" class="overflow-visible">
                            <!-- Pole Mount Structural Body Schematic Map Layer -->
                            <rect x="50" y="30" width="120" height="60" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
                            <rect x="75" y="90" width="14" height="110" fill="#334155"/>
                            <rect x="131" y="90" width="14" height="110" fill="#334155"/>
                            <line x1="10" y1="200" x2="210" y2="200" stroke="#e2e8f0" stroke-width="2.5"/>
                            <text x="185" y="215" class="fill-slate-500 text-[10px] font-black tracking-wider uppercase">Grade</text>

                            <!-- High-Contrast Vector Calibration Anchors -->

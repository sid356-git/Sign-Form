<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Survey Portal</title>
    <style>
        :root {
            --empire-red: #ff0000;
            --empire-blue: #0f398a;
            --empire-dark: #000000;
            --bg-light: #f1f5f9;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); padding: 20px; }
        
        .app-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        
        /* Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }

        /* UI Elements */
        .btn { padding: 15px; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; color: white; width: 100%; }
        .btn-submit { background: var(--empire-red); }
        .btn-delete { background: #fee2e2; color: var(--empire-red); padding: 5px; font-size: 0.7rem; border: 1px solid #fecaca; cursor: pointer; }
        
        #status-alert { padding: 10px; margin-bottom: 15px; border-radius: 6px; display: none; font-weight: 600; font-size: 0.8rem; }
        .live-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .gallery-card { border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px; }
        .gallery-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }

        /* Print Engine */
        #print-view { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-view, #print-view * { visibility: visible; }
            #print-view { position: absolute; left: 0; top: 0; width: 100%; display: block; }
            .p-table { width: 100%; border-collapse: collapse; }
            .p-table td { border: 1px solid #000; padding: 8px; font-size: 12px; }
            .p-label { background: #f1f5f9; font-weight: bold; width: 25%; }
        }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <h3>Empire Canopy Sign & Construction</h3>
    <div id="status-alert"></div>

    <div class="grid">
        <div class="input-group"><label>Work Order / Facility</label><input type="text" id="form_wo"></div>
        <div class="input-group"><label>Survey Date</label><input type="date" id="form_date"></div>
        <div class="input-group"><label>Surveyor</label><input type="text" id="form_surveyor"></div>
    </div>
    <div class="input-group"><label>Address</label><input type="text" id="form_address"></div>

    <hr>
    
    <div class="input-group">
        <label>Photo Capture</label>
        <input type="file" id="fileSelector" accept="image/*" multiple>
    </div>
    
    <div class="live-gallery" id="previewGallery"></div>
    <button id="btnSubmit" class="btn btn-submit" style="margin-top:20px;">Generate Survey Package</button>
</div>

<div id="print-view"></div>

<script>
const SurveyApp = {
    images: [],
    
    init() {
        document.getElementById('form_date').valueAsDate = new Date();
        document.getElementById('fileSelector').addEventListener('change', (e) => this.processImages(e));
        document.getElementById('btnSubmit').addEventListener('click', () => this.generatePrintLayout());
    },

    processImages(e) {
        const files = e.target.files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                this.images.push({ id: Date.now() + Math.random(), src: event.target.result });
                this.renderGallery();
            };
            reader.readAsDataURL(file);
        });
    },

    renderGallery() {
        const gallery = document.getElementById('previewGallery');
        gallery.innerHTML = this.images.map(img => `
            <div class="gallery-card">
                <img src="${img.src}">
                <button class="btn-delete" onclick="SurveyApp.removeImage(${img.id})">Delete</button>
            </div>
        `).join('');
    },

    removeImage(id) {
        this.images = this.images.filter(i => i.id !== id);
        this.renderGallery();
    },

    generatePrintLayout() {
        const printDiv = document.getElementById('print-view');
        printDiv.innerHTML = `
            <h2>Empire Field Survey: ${document.getElementById('form_wo').value}</h2>
            <table class="p-table">
                <tr><td class="p-label">Date</td><td>${document.getElementById('form_date').value}</td></tr>
                <tr><td class="p-label">Location</td><td>${document.getElementById('form_address').value}</td></tr>
            </table>
            ${this.images.map(img => `<img src="${img.src}" style="width:100%; margin-top:10px;">`).join('')}
        `;
        window.print();
    }
};

SurveyApp.init();
</script>
</body>
</html>
